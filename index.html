<!DOCTYPE html>
<html>
<head>
    <title>Mental Health Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Mental Health Chatbot</h1>

    <form method="POST">
        <input type="text" name="message" placeholder="How are you feeling?" required>
        <button type="submit">Send</button>
    </form>

    <div class="reply">
        <p>{{ reply }}</p>
    </div>
</div>

</body>
</html>
